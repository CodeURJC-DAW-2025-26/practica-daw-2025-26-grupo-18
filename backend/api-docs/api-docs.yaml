openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: https://localhost:8443
    description: Generated server url
tags:
  - name: Event API
    description: "Event browsing, detail and management endpoints"
  - name: Statistics API
    description: Analytics endpoints returning chart-ready data
  - name: Image API
    description: "Endpoints that serve profile, course and event images"
  - name: Admin API
    description: Administrative endpoints for moderation and resource management
  - name: Profile API
    description: Profile data retrieval and update endpoints
  - name: Authentication API
    description: Registration and account availability endpoints
  - name: Course API
    description: "Course browsing, detail and management endpoints"
  - name: Cart API
    description: Shopping cart and checkout endpoints
  - name: Global API
  /api/v1/events/purchases:
paths:
  /api/v1/profile/{id}:
    get:
      tags:
        - Profile API
      summary: Get profile
      description: Returns complete profile data for a given user id.
      operationId: profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
  /api/v1/events/locations:
                $ref: "#/components/schemas/ProfileDTO"
    put:
      tags:
        - Profile API
      summary: Update profile (JSON)
      description: Updates profile data from JSON payload for the authenticated owner.
      operationId: editProfileMultipart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                request:
                  $ref: "#/components/schemas/ProfileUpdateRequestDTO"
                imageFile:
                  type: string
                  format: binary
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequestDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/events/{id}:
    get:
      tags:
        - Event API
      summary: Get event detail
      description:
        Returns a full event detail payload including management and purchase
        flags.
      operationId: getEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
  /api/v1/courses/{courseId}/lessons/{lessonId}/completions:
              schema:
                type: object
                additionalProperties:
                  type: object
    put:
      tags:
        - Event API
      summary: Update event
      description: Updates an event if the current user is authorized.
      operationId: updateEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tagNames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
  /api/v1/courses/{courseId}/lessons/{lessonId}/video:
                event:
                  $ref: "#/components/schemas/EventDTO"
                imageFile:
                  type: string
                  format: binary
              required:
                - event
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
    delete:
      tags:
        - Event API
      summary: Delete event
      description: Deletes an event if the current user is authorized.
      operationId: deleteEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/courses/{id}:
    get:
      tags:
        - Course API
      summary: Get course detail
      description:
        Returns a full course detail payload including permissions and
        progress flags.
      operationId: getCourse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                additionalProperties:
                  type: object
    put:
      tags:
        - Course API
      summary: Update course
      description: Updates a course if the current user is authorized.
      operationId: updateCourse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: tagNames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                course:
                  $ref: "#/components/schemas/CourseDTO"
                imageFile:
                  type: string
                  format: binary
              required:
                - course
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
    delete:
      tags:
        - Course API
      summary: Delete course
      description: Deletes a course if the current user is authorized.
      operationId: deleteCourse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/admin/users/{id}/status:
    put:
      tags:
        - Admin API
      summary: Update user status
      description: Activates or deactivates a user account by id.
      operationId: updateUserStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/v1/admin/events/{id}/status:
    put:
      tags:
        - Admin API
      summary: Update event status
      description: Updates event moderation status (published or draft) by id.
      operationId: updateEventStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceStatusRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/v1/admin/courses/{id}/status:
    put:
      tags:
        - Admin API
      summary: Update course status
      description: Updates course moderation status (published or draft) by id.
      operationId: updateCourseStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceStatusRequest"
        required: true
      responses:
        "200":
          description: OK
  /api/v1/events/:
    get:
      tags:
        - Event API
      summary: List events
      description:
        Returns paginated published events with optional search and tag
        filters.
      operationId: getEvents
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
    post:
      tags:
        - Event API
      summary: Create event
      description:
        "Creates an event from multipart data, optionally including image\
        \ and tags."
      operationId: createEvent
      parameters:
        - name: tagNames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                event:
                  $ref: "#/components/schemas/EventDTO"
                imageFile:
                  type: string
                  format: binary
              required:
                - event
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/courses/{id}/reviews:
    post:
      tags:
        - Course API
      summary: Add review
      description: Adds a review to a course from the authenticated user.
      operationId: addReview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: rating
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: content
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/courses/{courseId}/lessons/{lessonId}/completions:
    post:
      tags:
        - Course API
      summary: Complete lesson
      description:
        Marks a lesson as completed and returns updated course progress
        information.
      operationId: markLessonAsCompleted
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                additionalProperties:
                  type: object
  /api/v1/courses/:
    get:
      tags:
        - Course API
      summary: List courses
      description:
        Returns paginated published courses with optional search and tag
        filters.
      operationId: getCourses
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: tags
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
    post:
      tags:
        - Course API
      summary: Create course
      description:
        "Creates a course from multipart data, optionally including image\
        \ and tags."
      operationId: createCourse
      parameters:
        - name: tagNames
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                course:
                  $ref: "#/components/schemas/CourseDTO"
                imageFile:
                  type: string
                  format: binary
              required:
                - course
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/cart/items/{itemId}:
    delete:
      tags:
        - Cart API
      summary: Remove cart item
      description: Removes an item from the authenticated user's cart by item id.
      operationId: removeItemFromCart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrderDTO"
  /api/v1/cart/payments:
    post:
      tags:
        - Cart API
      summary: Checkout
      description: Processes payment and finalizes the current pending order.
      operationId: checkout
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequestDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/cart/subscriptions:
    post:
      tags:
        - Cart API
      summary: Add subscription to cart
      description:
        Adds a subscription line item to the authenticated user's pending
        order.
      operationId: addSubscriptionToCart
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrderDTO"
  /api/v1/cart/events/{id}:
    post:
      tags:
        - Cart API
      summary: Add event to cart
      description: Adds an event to the authenticated user's pending order.
      operationId: addEventToCart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/cart/courses/{id}:
    post:
      tags:
        - Cart API
      summary: Add course to cart
      description: Adds a course to the authenticated user's pending order.
      operationId: addCourseToCart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
  /api/v1/auth/register:
    post:
      tags:
        - Authentication API
      summary: Register user (JSON)
      description: Registers a user from a JSON payload and attempts automatic login.
      operationId: registerUserMultipart
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                request:
                  $ref: "#/components/schemas/RegisterRequestDTO"
                image:
                  type: string
                  format: binary
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequestDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication API
      summary: Refresh token
      description:
        Issues fresh credentials using a refresh token from cookie or authorization
        header.
      operationId: refresh
      parameters:
        - name: RefreshToken
          in: cookie
          required: false
          schema:
            type: string
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/logout:
    post:
      tags:
        - Authentication API
      summary: Logout
      description: Invalidates current authentication context and clears auth cookies.
      operationId: logout
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/login:
    post:
      tags:
        - Authentication API
      summary: Login
      description: Authenticates a user with username and password.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/statistics/lessons-learned:
    get:
      tags:
        - Statistics API
      summary: Lessons learned
      description: Returns monthly lessons completed by the user.
      operationId: lessonsLearned
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/created-course-status:
    get:
      tags:
        - Statistics API
      summary: Created course completion status
      description: Returns completion breakdown for students of a course.
      operationId: createdCourseStatus
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/course-user-progress:
    get:
      tags:
        - Statistics API
      summary: User progress in course
      description: Returns completed vs pending lessons for one user in one course.
      operationId: courseUserProgress
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/course-tags:
    get:
      tags:
        - Statistics API
      summary: Common course tags
      description: Returns overlap between user interests and course tags.
      operationId: courseTags
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: courseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/course-progress:
    get:
      tags:
        - Statistics API
      summary: Course progress
      description: Returns completed vs in-progress course counts for a user.
      operationId: courseProgress
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/course-genders:
    get:
      tags:
        - Statistics API
      summary: Course genders
      description: Returns gender distribution for enrollments in a course.
      operationId: courseGenders
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/statistics/course-ages:
    get:
      tags:
        - Statistics API
      summary: Course ages
      description: Returns age-range distribution for enrollments in a course.
      operationId: courseAges
      parameters:
        - name: courseId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ChartDTO"
  /api/v1/profile/me:
    get:
      tags:
        - Profile API
      summary: Get current profile id
      description: Returns the current authenticated user id.
      operationId: myProfile
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int64
  /api/v1/images/users/{userId}/profile:
    get:
      tags:
        - Image API
      summary: Get user profile image
      description: Returns profile image bytes for a user id.
      operationId: getUserProfileImage_1
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
                format: byte
  /api/v1/images/events/{eventId}:
    get:
      tags:
        - Image API
      summary: Get event image
      description: Returns event image bytes for an event id.
      operationId: getEventImage
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
                format: byte
  /api/v1/images/courses/{courseId}:
    get:
      tags:
        - Image API
      summary: Get course image
      description: Returns course image bytes for a course id.
      operationId: getCourseImage
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: string
                format: byte
  /api/v1/global:
    get:
      tags:
        - Global API
      summary: Get global data
      description: Returns global UI/session metadata used by frontend clients.
      operationId: getGlobalData
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/GlobalDataDTO"
  /api/v1/events/purchases:
    get:
      tags:
        - Event API
      summary: List purchased events
      description: Returns events purchased by the authenticated user.
      operationId: purchasedEvents
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
  /api/v1/events/locations:
    get:
      tags:
        - Event API
      summary: Search locations
      description: Searches event locations using the external geocoding service.
      operationId: searchLocations
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /api/v1/courses/{courseId}/lessons/{lessonId}/video:
    get:
      tags:
        - Course API
      summary: Get lesson video URL
      description: Returns the lesson video URL if the user has access rights.
      operationId: getLessonVideoUrl
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/courses/subscribed:
    get:
      tags:
        - Course API
      summary: List subscribed courses
      description: Returns courses subscribed by the authenticated user.
      operationId: subscribedCourses
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    type: object
  /api/v1/cart:
    get:
      tags:
        - Cart API
      summary: Get cart
      description: Returns the current authenticated user's pending cart order.
      operationId: getCart
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrderDTO"
  /api/v1/auth/register/availability:
    get:
      tags:
        - Authentication API
      operationId: checkAvailability_1
      parameters:
        - name: username
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: boolean
  /api/v1/admin/users:
    get:
      tags:
        - Admin API
      summary: List users
      description:
        Returns paginated users for admin management with optional text
        filtering.
      operationId: getUsers
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDTO"
  /api/v1/admin/reviews:
    get:
      tags:
        - Admin API
      summary: List reviews
      description: Returns all reviews available for moderation.
      operationId: getReviews
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewDTO"
