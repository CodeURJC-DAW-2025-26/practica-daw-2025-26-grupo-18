<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Error - SCAM</title>
        <link rel="stylesheet" href="/main.css" />
    </head>

    <body>
        <main class="error-page-wrap">
            <section class="error-page-card" role="alert" aria-live="polite">
                <div class="error-page-badge">Error</div>
                <h1>Ha ocurrido un error</h1>
                <p class="error-page-subtitle">Lo sentimos, algo ha salido mal.</p>

                <dl class="error-page-details">
                    <div class="error-page-detail-row">
                        <dt>Status</dt>
                        <dd>{{status}}</dd>
                    </div>
                    <div class="error-page-detail-row">
                        <dt>Error</dt>
                        <dd>{{error}}</dd>
                    </div>
                    <div class="error-page-detail-row">
                        <dt>Mensaje</dt>
                        <dd>{{message}}</dd>
                    </div>
                </dl>

                <a href="/" class="error-page-home-link">Volver al inicio</a>
            </section>
        </main>
    </body>
</html>
